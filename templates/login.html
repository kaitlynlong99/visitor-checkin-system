<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Admin Login</title>
        <style>
            body { font-family: Arial; margin: 50px; }
            form { max-width: 350px; margin: auto; }
            label { display: block; margin-top: 15px; }
            
            input, button {
                width: 100%;
                box-sizing: border-box;
            }


            input { 
                padding: 10px;
                margin-top: 5px;
             }


            button { 
                margin-top: 20px;
                padding: 10px;
                background-color: #333;
                color: white;
                border: none;
                cursor: pointer;
                font-weight: bold;
                border-radius: 4px;
             }
             
            button:hover { background-color: #111; }
        </style>
    </head>
    <body>

        <h2 style="text-align: center;">Admin Login</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div style="color: {{ 'red' if category == 'error' else 'green' }}; margin-top: 10px;">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Username:</label>
        <input type="text" name="username" required oninput="this.value = this.value.trim().toLowerCase()">

        <label>Password:</label>
        <input type="password" name="password" required oninput="this.value = this.value.trim()">

        <button type="submit">Login</button>
    </form>
        
    </body>
</html>
